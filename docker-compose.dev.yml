version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    env_file:
      - ./backend/.env
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app                  # Mount local source into container
      - ~/.m2:/root/.m2                 # Cache Maven dependencies
      - ./backend/target:/app/target    # Mount compiled classes for DevTools
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/angkorlance
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: angkorlance-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: angkorlance
    ports:
      - "5432:5432"
    volumes:
      - angkorlance-db-data:/var/lib/postgresql/data

volumes:
  angkorlance-db-data:
