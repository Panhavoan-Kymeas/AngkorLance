version: "3.9"

services:
  backend:
    build: ./backend
    container_name: angkorlance-backend
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/angkorlance
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
    depends_on:
      - db
    volumes:
      - angkorlance-uploads:/var/www/images

  frontend:
    build: ./frontend
    container_name: angkorlance-frontend
    depends_on:
      - backend

  db:
    image: postgres:15
    container_name: angkorlance-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: angkorlance
    volumes:
      - angkorlance-db-data:/var/lib/postgresql/data

  nginx:
    image: nginx:alpine
    container_name: angkorlance-nginx
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf
      - angkorlance-uploads:/var/www/images

volumes:
  angkorlance-db-data:
  angkorlance-uploads:
